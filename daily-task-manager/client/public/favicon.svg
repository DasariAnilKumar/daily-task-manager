<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" fill="none">
  <!-- Rounded container with silver metallic border -->
  <rect x="2" y="2" width="20" height="20" rx="6" fill="#0d0d0d" stroke="url(#silver-grad)" stroke-width="2" />
  
  <!-- Checkmark using a beautiful holographic gradient -->
  <path d="M7 12l3 3 7-7" stroke="url(#holo-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  
  <defs>
    <!-- Silver Border Gradient -->
    <linearGradient id="silver-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#a1a1aa" />
      <stop offset="100%" stop-color="#3f3f46" />
    </linearGradient>
    
    <!-- Holographic Checkmark Gradient (matches Loop Animation) -->
    <linearGradient id="holo-grad" x1="7" y1="7" x2="17" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a5f3fc" />
      <stop offset="50%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>
  </defs>
</svg>